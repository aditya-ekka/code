<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>INHEAD SCRIPT FN</title>
   <script>
      function myFunction() {
         document.getElementById("demo").innerHTML = "Hello JavaScript!";
      }
      function fun2() {
         document.getElementById("demo").innerHTML = "Hello World!";
      }
   </script>
</head>
<body>
   <p id="demo">Nice to meet'cha</p>
   <button type="button" onclick="myFunction()">Js</button>
   <button type="button" onclick="fun2()">World</button>
</body>
</html>
